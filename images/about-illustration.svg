<svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background warm circle -->
  <circle cx="240" cy="210" r="190" fill="#f0e8de" opacity="0.6"/>

  <!-- Shelf / surface -->
  <rect x="60" y="310" width="360" height="8" rx="4" fill="#d4c4b0"/>
  <rect x="80" y="318" width="320" height="4" rx="2" fill="#c8b49a" opacity="0.5"/>

  <!-- LEFT: Camera body -->
  <rect x="85" y="235" width="90" height="70" rx="10" fill="#2c2c2c"/>
  <rect x="90" y="240" width="80" height="60" rx="8" fill="#3a3a3a"/>
  <!-- lens outer -->
  <circle cx="130" cy="272" r="22" fill="#1a1a1a"/>
  <circle cx="130" cy="272" r="17" fill="#111"/>
  <circle cx="130" cy="272" r="11" fill="#222" stroke="#555" stroke-width="1"/>
  <circle cx="130" cy="272" r="5"  fill="#444"/>
  <circle cx="125" cy="267" r="2"  fill="#fff" opacity="0.3"/>
  <!-- flash -->
  <rect x="155" y="243" width="12" height="8" rx="2" fill="#a85c3a"/>
  <!-- grip bump -->
  <rect x="85" y="250" width="14" height="40" rx="6" fill="#222"/>
  <!-- shutter -->
  <rect x="120" y="236" width="20" height="6" rx="3" fill="#555"/>

  <!-- Camera strap -->
  <path d="M88 240 Q70 220 80 200 Q90 185 105 190" stroke="#8b6c4a" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- CENTER: Smartphone -->
  <rect x="195" y="195" width="90" height="120" rx="12" fill="#1c1c1c"/>
  <rect x="200" y="200" width="80" height="110" rx="9" fill="#2a2a2a"/>
  <!-- screen glow -->
  <rect x="203" y="203" width="74" height="100" rx="7" fill="#f5f1ed" opacity="0.08"/>
  <!-- screen content lines -->
  <rect x="210" y="215" width="50" height="4" rx="2" fill="#a85c3a" opacity="0.7"/>
  <rect x="210" y="225" width="40" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="210" y="232" width="45" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
  <rect x="210" y="250" width="54" height="28" rx="4" fill="#a85c3a" opacity="0.2"/>
  <rect x="210" y="284" width="54" height="6" rx="3" fill="#fff" opacity="0.1"/>
  <!-- home bar -->
  <rect x="228" y="303" width="24" height="3" rx="1.5" fill="#555"/>
  <!-- front camera -->
  <circle cx="240" cy="206" r="2.5" fill="#111"/>
  <!-- side buttons -->
  <rect x="285" y="225" width="4" height="16" rx="2" fill="#333"/>
  <rect x="191" y="220" width="4" height="10" rx="2" fill="#333"/>
  <rect x="191" y="234" width="4" height="10" rx="2" fill="#333"/>

  <!-- RIGHT: Smartwatch -->
  <rect x="310" y="228" width="68" height="80" rx="14" fill="#1c1c1c"/>
  <rect x="315" y="233" width="58" height="70" rx="11" fill="#2a2a2a"/>
  <!-- watch face -->
  <rect x="318" y="236" width="52" height="62" rx="9" fill="#f5f1ed" opacity="0.07"/>
  <!-- watch display -->
  <rect x="322" y="246" width="44" height="14" rx="3" fill="#a85c3a" opacity="0.6"/>
  <rect x="325" y="248" width="20" height="10" rx="2" fill="#a85c3a" opacity="0.8"/>
  <rect x="322" y="264" width="44" height="4" rx="2" fill="#fff" opacity="0.12"/>
  <rect x="322" y="272" width="30" height="4" rx="2" fill="#fff" opacity="0.09"/>
  <rect x="322" y="280" width="44" height="10" rx="3" fill="#fff" opacity="0.06"/>
  <!-- crown -->
  <rect x="378" y="255" width="6" height="18" rx="3" fill="#333"/>
  <!-- strap top -->
  <rect x="323" y="215" width="42" height="16" rx="6" fill="#2c2c2c"/>
  <rect x="330" y="217" width="28" height="4" rx="2" fill="#3a3a3a"/>
  <!-- strap bottom -->
  <rect x="323" y="305" width="42" height="16" rx="6" fill="#2c2c2c"/>
  <rect x="330" y="313" width="28" height="4" rx="2" fill="#3a3a3a"/>

  <!-- Decorative: small tag label on camera -->
  <rect x="92" y="298" width="34" height="18" rx="3" fill="#f5f1ed" stroke="#d4c4b0" stroke-width="1"/>
  <line x1="92" y1="307" x2="80" y2="307" stroke="#d4c4b0" stroke-width="1"/>
  <circle cx="78" cy="307" r="2" fill="#d4c4b0"/>
  <rect x="97" y="303" width="18" height="2" rx="1" fill="#a85c3a" opacity="0.5"/>
  <rect x="97" y="308" width="12" height="2" rx="1" fill="#888" opacity="0.4"/>

  <!-- Small floating dots / accent marks -->
  <circle cx="165" cy="200" r="4" fill="#a85c3a" opacity="0.25"/>
  <circle cx="155" cy="215" r="2.5" fill="#a85c3a" opacity="0.18"/>
  <circle cx="175" cy="222" r="3" fill="#d4c4b0" opacity="0.5"/>
  <circle cx="300" cy="195" r="3.5" fill="#a85c3a" opacity="0.2"/>
  <circle cx="290" cy="210" r="2" fill="#d4c4b0" opacity="0.4"/>

  <!-- Brand subtle text -->
  <text x="240" y="375" text-anchor="middle"
        font-family="Georgia, serif" font-size="11"
        fill="#a85c3a" opacity="0.5" letter-spacing="3">
    PREMIUM · CURATED · TRUSTED
  </text>
</svg>
